<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>AR Page 01</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.0/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* ===== loading ===== */
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== hint ===== */
    #hint {
      position: fixed;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      z-index: 9999;
      text-shadow: 0 0 10px black;
      pointer-events: none;
    }
  </style>
</head>

<body>

<!-- 🔥 loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">
    正在生成你的“人格形态01”<br/>
    Generating your “Personality Form 01”
  </div>
</div>

<!-- 📌 hint -->
<div id="hint">
  请将摄像头对准卡片01<br/>
  Please point your camera at Card 01
</div>

<!-- 🎯 AR SCENE（关键：必须识别card才出现） -->
<a-scene
  mindar-image="imageTargetSrc: ./card01.mind;"
  vr-mode-ui="false"
  device-orientation-permission-ui="false"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights: false"
>

  <!-- 摄像头 -->
  <a-camera position="0 0 0" look-controls="false"></a-camera>

  <!-- ⭐ 只有识别到card01才触发 -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model
      src="./models/shape01.glb"
      position="0 0 -2.2"
      scale="0.7 0.7 0.7"

      animation__float="
        property: position;
        to: 0 0 -2.0;
        dir: alternate;
        loop: true;
        dur: 2200;
        easing: easeInOutSine;
      "

      animation__rot="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 12000;
        easing: linear;
      "
    ></a-gltf-model>

  </a-entity>

</a-scene>

<!-- ⏳ loading控制 -->
<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
  }, 1200);
});
</script>

</body>
</html>
